pipeline:
  stages:
    prepare:
      models:
        - deepseek/deepseek-v4-flash
        - anthropic/claude-haiku-4.5
        - openrouter/owl-alpha
        - moonshotai/kimi-k2.6
        - tencent/hy3-preview
        - anthropic/claude-sonnet-4.6
        - anthropic/claude-opus-4.7
      temperature: 0.0
      max_tokens: 4096
    scan:
      agent_routing:
        memory_corruption: deepseek/deepseek-v4-flash
        integer_overflow: deepseek/deepseek-v4-flash
        race_condition: tencent/hy3-preview
        auth_bypass: anthropic/claude-sonnet-4.6
        deserialization: deepseek/deepseek-v4-flash
        type_confusion: deepseek/deepseek-v4-flash
        signature_malleability: openrouter/owl-alpha
        account_confusion: tencent/hy3-preview
        oracle_manipulation: openrouter/owl-alpha
      agents_per_function: 5
      temperature: 0.3
      max_tokens: 8192
    validate:
      debaters:
        - model: deepseek/deepseek-v4-flash
          persona: pro-vulnerability
          temperature: 0.7
          max_tokens: 4096
        - model: anthropic/claude-haiku-4.5
          persona: anti-vulnerability
          temperature: 0.7
          max_tokens: 4096
        - model: openrouter/owl-alpha
          persona: arbiter
          temperature: 0.0
          max_tokens: 4096
      vote_threshold: 0.67
      min_debaters: 3
    dedup:
      embedding_model: text-embedding-3-small
      similarity_threshold: 0.85
      clustering_algorithm: dbscan
      eps: 0.5
      min_samples: 2
    prove:
      poc_generator: anthropic/claude-opus-4.7
      temperature: 0.0
      max_tokens: 8192
      sanitizers:
        - address
        - thread
        - undefined
      sandbox: docker
      timeout_seconds: 300

budget:
  max_cost_usd: 50.00
  stage_limits:
    prepare: 1.00
    scan: 5.00
    validate: 2.00
    dedup: 0.50
    prove: 1.50
  cost_tracking: true

openrouter:
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 120
  max_retries: 3

cdp:
  grounding_required: true
  enforce_terminators: true
  d3fend_required: true

targets:
  supported_types:
    - solana-program
    - evm-contract
    - c-cpp-source
    - rust-source
    - android-apk
    - binary-elf
    - binary-pe
    - linux-kernel-module
    - live-host
    - network-range-own-assets

logging:
  level: INFO
  format: json
  output_dir: logs
  pipeline_trace: true
  cost_log: true
