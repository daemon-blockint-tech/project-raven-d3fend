pipeline:
  stages:
    prepare:
      models:
        - claude-3.5-sonnet
        - gpt-4
        - gemini-pro
      temperature: 0.0
      max_tokens: 4096
    scan:
      agent_routing:
        memory_corruption: claude-3.5-sonnet
        integer_overflow: claude-3.5-sonnet
        race_condition: gpt-4
        auth_bypass: gemini-pro
        deserialization: claude-3.5-sonnet
        type_confusion: claude-3.5-sonnet
        signature_malleability: gemini-pro
        account_confusion: gpt-4
        oracle_manipulation: gemini-pro
      agents_per_function: 5
      temperature: 0.3
      max_tokens: 8192
    validate:
      debaters:
        - model: claude-3.5-sonnet
          persona: pro-vulnerability
          temperature: 0.7
          max_tokens: 4096
        - model: gpt-4
          persona: anti-vulnerability
          temperature: 0.7
          max_tokens: 4096
        - model: gemini-pro
          persona: arbiter
          temperature: 0.0
          max_tokens: 4096
      vote_threshold: 0.67
      min_debaters: 3
    dedup:
      embedding_model: text-embedding-3-small
      similarity_threshold: 0.85
      clustering_algorithm: dbscan
      eps: 0.5
      min_samples: 2
    prove:
      poc_generator: claude-3.5-sonnet
      temperature: 0.0
      max_tokens: 8192
      sanitizers:
        - address
        - thread
        - undefined
      sandbox: docker
      timeout_seconds: 300

budget:
  max_cost_usd: 10.00
  stage_limits:
    prepare: 1.00
    scan: 5.00
    validate: 2.00
    dedup: 0.50
    prove: 1.50
  cost_tracking: true

openrouter:
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 120
  max_retries: 3

cdp:
  grounding_required: true
  enforce_terminators: true
  d3fend_required: true

targets:
  supported_types:
    - solana-program
    - evm-contract
    - c-cpp-source
    - rust-source
    - android-apk
    - binary-elf
    - binary-pe
    - linux-kernel-module
    - live-host
    - network-range-own-assets

logging:
  level: INFO
  format: json
  output_dir: logs
  pipeline_trace: true
  cost_log: true
